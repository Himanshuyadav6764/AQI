[build]
builder = "NIXPACKS"
buildCommand = "python -m pip install --upgrade pip && pip install -r aqi-monitoring.final2-main/backend/requirements.txt"

[deploy]
startCommand = "cd aqi-monitoring.final2-main/backend && gunicorn app:app --bind 0.0.0.0:$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
